# GitLab CI/CD Pipeline for Syft SBOM Scanner Image
#
# Builds the Syft SBOM generator image used by scanning
# pipelines to produce CycloneDX SBOMs.

stages:
  - build

variables:
  DOCKER_IMAGE: "syft:${CI_COMMIT_SHORT_SHA}"

build-image:
  stage: build
  image: docker:27.0
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker tag $DOCKER_IMAGE syft:0.5.0
    - docker images syft
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
